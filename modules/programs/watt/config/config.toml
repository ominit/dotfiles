# Emergency thermal protection (highest priority)
[[rule]]
name = "emergency-thermal-protection"
if = { is-more-than = 85.0, value = "$cpu-temperature" }
priority = 100

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "power", then = "power" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "power", then = "power" }
cpu.frequency-mhz-maximum = { if = "?frequency-available", then = 1800 }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }

# Low-battery protection on battery power
[[rule]]
name = "critical-battery"
if.all = [
  "?discharging",
  { is-less-than = 0.1, value = "%power-supply-charge" },
]
priority = 90

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "power", then = "power" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "power", then = "power" }
cpu.frequency-mhz-maximum = { if = "?frequency-available", then = 1400 }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }

# Keep battery thermals under control during long unplugged workloads
[[rule]]
name = "battery-soft-thermal-cap"
if.all = [
  "?discharging",
  { is-more-than = 0.1, value = "%power-supply-charge" },
  { is-more-than = 80.0, value = "$cpu-temperature" },
]
priority = 80

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "power", then = "power" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "power", then = "power" }
cpu.frequency-mhz-maximum = { if = "?frequency-available", then = 2000 }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }

# When plugged in with a drained battery, leave more headroom for charging
[[rule]]
name = "ac-charge-recovery"
if.all = [
  { not = "?discharging" },
  { is-less-than = 0.3, value = "%power-supply-charge" },
]
priority = 70

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "balance-power", then = "balance-power" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "balance_performance", then = "balance_performance" }
cpu.frequency-mhz-maximum = { if = "?frequency-available", then = 2200 }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }

# On AC, stay fast whenever the machine is active or doing real work
[[rule]]
name = "ac-active-performance"
if.all = [
  { not = "?discharging" },
  { is-more-than = 0.3, value = "%power-supply-charge" },
  { any = [
    { is-more-than = 0.15, value = { cpu-usage-since = "1sec" } },
    { is-less-than = 60.0, value = "$cpu-idle-seconds" },
  ] },
]
priority = 50

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "balance-performance", then = "balance-performance" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "performance", then = "performance" }
cpu.governor = { if.is-governor-available = "performance", then = "performance" }
cpu.turbo = { if = "?turbo-available", then = true }

# Idle unplugged sessions should save power for note-taking and class use
[[rule]]
name = "battery-idle-saver"
if.all = [
  "?discharging",
  { is-more-than = 0.1, value = "%power-supply-charge" },
  { is-less-than = 0.15, value = { cpu-usage-since = "10sec" } },
  { is-more-than = 60.0, value = "$cpu-idle-seconds" },
]
priority = 40

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "power", then = "power" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "power", then = "power" }
cpu.frequency-mhz-maximum = { if = "?frequency-available", then = 1800 }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }

# Default unplugged behavior should stretch runtime without feeling dead
[[rule]]
name = "battery-default"
if.all = [
  "?discharging",
  { is-more-than = 0.1, value = "%power-supply-charge" },
]
priority = 30

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "power", then = "power" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "balance_power", then = "balance_power" }
cpu.frequency-mhz-maximum = { if = "?frequency-available", then = 2000 }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }

# On AC, relax when truly idle but stay quick to wake up
[[rule]]
name = "ac-idle-relief"
if.all = [
  { not = "?discharging" },
  { is-more-than = 0.3, value = "%power-supply-charge" },
  { is-less-than = 0.15, value = { cpu-usage-since = "10sec" } },
  { is-more-than = 60.0, value = "$cpu-idle-seconds" },
]
priority = 20

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "balance-performance", then = "balance-performance" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "balance_performance", then = "balance_performance" }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = true }

# Fallback rule for anything not covered above
[[rule]]
name = "default-balanced"
priority = 0

cpu.energy-perf-bias = { if.is-energy-perf-bias-available = "balance-performance", then = "balance-performance" }
cpu.energy-performance-preference = { if.is-energy-performance-preference-available = "balance_performance", then = "balance_performance" }
cpu.governor = { if.is-governor-available = "powersave", then = "powersave" }
cpu.turbo = { if = "?turbo-available", then = false }
